name: Slack Notify TVCF

on:
  # cron-job.org에서 트리거할 수 있게 수동 실행 + REST API 호출 가능
  workflow_dispatch:
  # 백업으로 GitHub cron도 같이 (신뢰성은 낮지만 보조용)
  schedule:
    # 평일 KST 13:00 = UTC 04:00
    # 월(1)-금(5)
    - cron: '0 4 * * 1-5'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python scripts/notify.py
