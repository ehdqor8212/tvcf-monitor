name: Daily TVCF Crawl
on:
  # cron-job.org에서 트리거 (REST API 호출)
  # GitHub cron은 시간이 부정확하므로 제거됨
  # cron-job.org에 10시/12시/17시 3개 등록되어 있음
  workflow_dispatch:
permissions:
  contents: write
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Run scraper
        env:
          MASTER_ADVERTISERS: ${{ secrets.MASTER_ADVERTISERS }}
        run: python scripts/scrape.py
      - name: Commit and push results
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Crawl: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
